name: DevSpace Backend Lint

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  lint-backend:
    name: lint-backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect backend changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'apps/devspace/backend/**'
              - 'go.mod'
              - 'go.sum'

      - name: Setup Go
        if: steps.filter.outputs.backend == 'true'
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true
          cache-dependency-path: |
            apps/devspace/backend/go.sum
            go.sum

      - name: Install staticcheck
        if: steps.filter.outputs.backend == 'true'
        run: go install honnef.co/go/tools/cmd/staticcheck@latest

      - name: Cache staticcheck
        if: steps.filter.outputs.backend == 'true'
        uses: actions/cache@v4
        with:
          path: ~/go/bin/staticcheck
          key: ${{ runner.os }}-staticcheck-${{ hashFiles('go.mod') }}
          restore-keys: |
            ${{ runner.os }}-staticcheck-

      - name: Run staticcheck
        if: steps.filter.outputs.backend == 'true'
        working-directory: apps/devspace/backend
        run: staticcheck ./...

      - name: Run go vet
        if: steps.filter.outputs.backend == 'true'
        working-directory: apps/devspace/backend
        run: go vet ./...

      - name: Skip lint
        if: steps.filter.outputs.backend == 'false'
        run: echo "No backend changes, skipping."
