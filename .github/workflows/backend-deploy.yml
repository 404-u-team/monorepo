name: Deploy Devspace Stand Backend
on:
  push:
    branches:
      - main
    paths:
      - 'apps/devspace/backend/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Forge and Send GitHub Webhook to Komodo
        env:
          # Твой секрет из настроек Komodo
          WEBHOOK_SECRET: ${{ secrets.KOMODO_SECRET }}
          # URL первого стека
          WEBHOOK_URL_1: "https://komodo.ms0ur.dev/listener/github/stack/69ac1c99290a1e620af7419d/deploy"
          # URL второго стека (если нужен)
          WEBHOOK_URL_2: "https://komodo.ms0ur.dev/listener/github/stack/69ac3510290a1e620af74368/deploy"
        run: |
          # Читаем сырой JSON payload текущего события (пуша)
          PAYLOAD=$(cat "$GITHUB_EVENT_PATH")
          
          # Генерируем HMAC SHA256 подпись, как это делает под капотом сам GitHub
          SIGNATURE="sha256=$(echo -n "$PAYLOAD" | openssl dgst -sha256 -hmac "$WEBHOOK_SECRET" | sed 's/^.* //')"
          
          # Отправляем запрос для первого стека, притворяясь гитхабом
          curl -X POST -H "Content-Type: application/json" \
               -H "X-GitHub-Event: push" \
               -H "X-Hub-Signature-256: $SIGNATURE" \
               -d "$PAYLOAD" \
               "$WEBHOOK_URL_1"
               
          # Если нужно дернуть и второй стек разом:
          curl -X POST -H "Content-Type: application/json" \
               -H "X-GitHub-Event: push" \
               -H "X-Hub-Signature-256: $SIGNATURE" \
               -d "$PAYLOAD" \
               "$WEBHOOK_URL_2"