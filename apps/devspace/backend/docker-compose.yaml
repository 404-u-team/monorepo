services:
    db:
        image: postgres:15-alpine
        restart: always
        env_file:
            - .env
        volumes:
            - db_data:/var/lib/postgresql/data
        ports:
            - "5432:5432"
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
            interval: 5s
            timeout: 2s
            retries: 10

    api:
        build: .
        restart: on-failure
        depends_on:
            - db
        env_file:
            - .env
        ports:
            - "8080:8080"

volumes:
    db_data:
        driver: local
