        - BearerAuth: []
components:
  schemas:
    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        nickname:
          type: string
        avatar_uri:
          type: string
          format: uri
        bio:
          type: string
        created_at:
          type: string
          format: date-time
    PrivateUserProfile:
      allOf:
        - $ref: '#/components/schemas/User'
        - type: object
          properties:
            skills:
              type: array
              items:
                $ref: '#/components/schemas/Skill'
    PublicUserProfile:
      type: object
      properties:
        id:
          type: string
          format: uuid
        nickname:
          type: string
        avatar_uri:
          type: string
          format: uri
        bio:
          type: string
        skills:
          type: array
          items:
            $ref: '#/components/schemas/Skill'
    Skill:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        parent_id:
          type: string
          format: uuid
          nullable: true
        children:
          type: array
          items:
            $ref: '#/components/schemas/Skill'
    Idea:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
        author_id:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    Project:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
        leader_id:
          type: string
          format: uuid
        status:
          type: string
          enum:
            - open
            - closed
        idea_id:
          type: string
          format: uuid
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    ProjectSlot:
      type: object
      properties:
        id:
          type: string
          format: uuid
        project_id:
          type: string
          format: uuid
        skill_category_id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
        status:
          type: string
          enum:
            - open
            - closed
        user_id:
          type: string
          format: uuid
          description: ID пользователя, занявшего слот (null, если свободен)
          nullable: true
        created_at:
          type: string
          format: date-time
    Request:
      type: object
      properties:
        id:
          type: string
          format: uuid
        type:
          type: string
          enum:
            - apply
            - invite
        status:
          type: string
          enum:
            - pending
            - accepted
            - rejected
        project_id:
          type: string
          format: uuid
        slot_id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
          description: >-
            ID пользователя, который откликнулся (для apply) или на кого пришло
            приглашение (для invite)
        leader_id:
          type: string
          format: uuid
          description: ID лидера проекта
        cover_letter:
          type: string
        created_at:
          type: string
          format: date-time
  responses: {}
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

