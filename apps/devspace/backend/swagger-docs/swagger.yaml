          headers: {}
      security:
        - BearerAuth: []
components:
  schemas:
    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        nickname:
          type: string
        avatar_uri:
          type: string
          format: uri
        bio:
          type: string
        created_at:
          type: string
          format: date-time
    PrivateUserProfile:
      allOf:
        - $ref: '#/components/schemas/User'
        - type: object
          properties:
            skills:
              type: array
              items:
                $ref: '#/components/schemas/Skill'
    PublicUserProfile:
      type: object
      properties:
        id:
          type: string
          format: uuid
        nickname:
          type: string
        avatar_uri:
          type: string
          format: uri
        bio:
          type: string
        skills:
          type: array
          items:
            $ref: '#/components/schemas/Skill'
    Skill:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        parent_id:
          type: string
          format: uuid
          nullable: true
        children:
          type: array
          items:
            $ref: '#/components/schemas/Skill'
    Idea:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
        author_id:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    Project:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
        leader_id:
          type: string
          format: uuid
        status:
          type: string
          enum:
            - open
            - closed
        idea_id:
          type: string
          format: uuid
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    ProjectSlot:
      type: object
      properties:
        id:
          type: string
          format: uuid
        project_id:
          type: string
          format: uuid
        skill_category_id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
        status:
          type: string
          enum:
            - open
            - closed
        user_id:
          type: string
          format: uuid
          description: ID пользователя, занявшего слот (null, если свободен)
          nullable: true
        created_at:
          type: string
          format: date-time
    Request:
      type: object
      properties:
        id:
          type: string
          format: uuid
        type:
          type: string
          enum:
            - apply
            - invite
        status:
          type: string
          enum:
            - pending
            - accepted
            - rejected
        project_id:
          type: string
          format: uuid
        slot_id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
          description: >-
            ID пользователя, который откликнулся (для apply) или на кого пришло
            приглашение (для invite)
        leader_id:
          type: string
          format: uuid
          description: ID лидера проекта
        cover_letter:
          type: string
        created_at:
          type: string
          format: date-time
  responses: {}
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
 

servers:
    - url: https://api.example.com/v1
      description: Основной сервер

paths:
    # ========== Аутентификация ==========
    /auth/register:
        post:
            summary: Регистрация пользователя
            description: Создает нового пользователя с ролью USER. Пароль хэшируется.
            tags:
                - Аутентификация
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            required:
                                - email
                                - password
                            properties:
                                email:
                                    type: string
                                    format: email
                                    example: user@example.com
                                password:
                                    type: string
                                    format: password
                                    minLength: 6
                                    example: securePassword123
            responses:
                "201":
                    description: Пользователь успешно зарегистрирован
                "400":
                    description: Ошибка валидации (например, email уже существует)

    /auth/login:
        post:
            summary: Вход в систему
            description: Аутентификация пользователя и получение JWT токенов.
            tags:
                - Аутентификация
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            required:
                                - login
                                - password
                            properties:
                                login:
                                    type: string
                                    description: Логин пользователя (email или никнейм)
                                    example: user@example.com
            responses:
                "200":
                    description: Успешный вход. Возвращает токены.
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    access_token:
                                        type: string
                                    refresh_token:
                                        type: string
                                    token_type:
                                        type: string
                                        example: Bearer
                "401":
                    description: Неверные учетные данные

    /auth/refresh:
        post:
            summary: Обновление Access и refresh токена
            description: Получение новой пары токенов по Refresh токену, передаваемому в cookie `refresh_token`.
            tags:
                - Аутентификация
            parameters:
                - in: cookie
                  name: refresh_token
                  required: true
                  description: Refresh токен, передаваемый в cookie `refresh_token`.
                  schema:
                      type: string
            responses:
                "200":
                    description: Токены успешно обновлены.
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    access_token:
                                        type: string
                                    refresh_token:
                                        type: string
                "401":
                    description: Недействительный или просроченный Refresh токен

    # ========== Пользователи ==========
    /users/me:
        get:
            summary: Получить свой профиль
            description: Возвращает полную информацию о текущем авторизованном пользователе.
            tags:
                - Пользователи
            security:
                - BearerAuth: []
            responses:
                "200":
                    description: Информация о профиле
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/PrivateUserProfile"
                "401":
                    description: Не авторизован
        put:
            summary: Обновить свой профиль
            description: Обновляет информацию текущего пользователя.
            tags:
                - Пользователи
            security:
                - BearerAuth: []
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                nickname:
                                    type: string
                                    example: john_doe
                                avatar_uri:
                                    type: string
                                    format: uri
                                    example: https://example.com/avatar.jpg
                                bio:
                                    type: string
                                    example: Full-stack разработчик
            responses:
                "200":
                    description: Профиль успешно обновлен
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/PrivateUserProfile"
                "400":
                    description: Ошибка валидации
                "401":
                    description: Не авторизован

    /users/me/skills:
        post:
            summary: Добавить навык в профиль
            description: Добавляет ссылку на существующую категорию навыка в профиль пользователя.
            tags:
                - Пользователи
                - Навыки
            security:
                - BearerAuth: []
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            required:
                                - skill_id
                            properties:
                                skill_id:
                                    type: string
                                    format: uuid
                                    example: "123e4567-e89b-12d3-a456-426614174000"
            responses:
                "201":
                    description: Навык успешно добавлен
                "400":
                    description: Навык уже существует у пользователя или не найден
                "401":
                    description: Не авторизован

    /users/me/skills/{skill_id}:
        delete:
            summary: Удалить навык из профиля
            description: Удаляет навык из списка навыков пользователя.
            tags:
                - Пользователи
                - Навыки
            security:
                - BearerAuth: []
            parameters:
                - name: skill_id
                  in: path
                  required: true
                  schema:
                      type: string
                      format: uuid
                  description: ID навыка (категории) для удаления
            responses:
                "204":
                    description: Навык успешно удален
                "401":
                    description: Не авторизован
                "404":
                    description: Навык не найден у пользователя

    /users/{user_id}:
        get:
            summary: Получить публичный профиль
            description: Возвращает публичную информацию о другом пользователе.
            tags:
                - Пользователи
            parameters:
                - name: user_id
                  in: path
                  required: true
                  schema:
                      type: string
                      format: uuid
                  description: UUID пользователя
            responses:
                "200":
                    description: Публичный профиль пользователя
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/PublicUserProfile"
                "404":
                    description: Пользователь не найден

    # ========== Навыки ==========
    /skills:
        get:
            summary: Получить список навыков
            description: Возвращает список всех категорий навыков с возможностью фильтрации по родителю и поиску.
            tags:
                - Навыки
            parameters:
                - name: parent_id
                  in: query
                  schema:
                      type: string
                      format: uuid
                  description: Фильтр по родительской категории (оставьте пустым для корневых)
                - name: search
                  in: query
                  schema:
                      type: string
                  description: Поиск по названию навыка
                - name: page
                  in: query
                  schema:
                      type: integer
                      default: 1
                  description: Номер страницы
                - name: limit
                  in: query
                  schema:
                      type: integer
                      default: 20
                  description: Количество записей на странице
            responses:
                "200":
                    description: Список навыков
                    content:
                        application/json:
                            schema:
                                type: array
                                items:
                                    $ref: "#/components/schemas/Skill"
        post:
            summary: Создать новый навык
            description: Создает новую категорию навыка. Доступно только модераторам/администраторам.
            tags:
                - Навыки
            security:
                - BearerAuth: []
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            required:
                                - name
                            properties:
                                name:
                                    type: string
                                    example: "Фронтенд разработка"
                                parent_id:
                                    type: string
                                    format: uuid
                                    description: ID родительской категории (null для корневой)
                                    example: "123e4567-e89b-12d3-a456-426614174000"
            responses:
                "201":
                    description: Навык успешно создан
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Skill"
                "400":
                    description: Ошибка валидации
                "403":
                    description: Недостаточно прав

    /skills/{skill_id}:
        get:
            summary: Получить детали навыка
            description: Возвращает информацию о конкретном навыке.
            tags:
                - Навыки
            parameters:
                - name: skill_id
                  in: path
                  required: true
                  schema:
                      type: string
                      format: uuid
                  description: UUID навыка
            responses:
                "200":
                    description: Информация о навыке
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Skill"
                "404":
                    description: Навык не найден

    # ========== Идеи ==========
    /ideas:
        get:
            summary: Список идей
            description: Возвращает список идей с пагинацией и фильтрацией.
            tags:
                - Идеи
            parameters:
                - name: author_id
                  in: query
                  schema:
                      type: string
                      format: uuid
                  description: Фильтр по автору
                - name: search
                  in: query
                  schema:
                      type: string
                  description: Поиск по заголовку и описанию
                - name: favorites
                  in: query
                  schema:
                      type: boolean
                  description: Показать только избранные идеи текущего пользователя (требует авторизации)
                - name: page
                  in: query
                  schema:
                      type: integer
                      default: 1
                - name: limit
                  in: query
                  schema:
                      type: integer
                      default: 20
            responses:
                "200":
                    description: Список идей
                    content:
                        application/json:
                            schema:
                                type: array
                                items:
                                    $ref: "#/components/schemas/Idea"
        post:
            summary: Создать идею
            description: Создает новую идею. Автор устанавливается автоматически из токена.
            tags:
                - Идеи
            security:
                - BearerAuth: []
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            required:
                                - title
                                - description
                            properties:
                                title:
                                    type: string
                                    example: "Мобильное приложение для изучения языков"
                                description:
                                    type: string
                                    example: "Идея создания приложения с использованием AI для практики разговорной речи."
            responses:
                "201":
                    description: Идея успешно создана
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Idea"
                "400":
                    description: Ошибка валидации
                "401":
                    description: Не авторизован

    /ideas/{idea_id}:
        get:
            summary: Получить детали идеи
            description: Возвращает информацию о конкретной идее (включая счетчики просмотров и избранного).
            tags:
                - Идеи
            parameters:
                - name: idea_id
                  in: path
                  required: true
                  schema:
                      type: string
                      format: uuid
                  description: UUID идеи
            responses:
                "200":
                    description: Детали идеи
                    content:
                        application/json:
                            schema:
                                allOf:
                                    - $ref: "#/components/schemas/Idea"
                                    - type: object
                                      properties:
                                          views_count:
                                              type: integer
                                              example: 150
                                          favorites_count:
                                              type: integer
                                              example: 25
                "404":
                    description: Идея не найдена
        put:
            summary: Редактировать идею
            description: Обновляет информацию об идее. Доступно только автору.
            tags:
                - Идеи
            security:
                - BearerAuth: []
            parameters:
                - name: idea_id
                  in: path
                  required: true
                  schema:
                      type: string
                      format: uuid
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                title:
                                    type: string
                                description:
                                    type: string
            responses:
                "200":
                    description: Идея обновлена
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Idea"
                "401":
                    description: Не авторизован
                "403":
                    description: Доступ запрещен (не автор)
                "404":
                    description: Идея не найдена
        delete:
            summary: Удалить идею
            description: Удаляет идею. Доступно только автору.
            tags:
                - Идеи
            security:
                - BearerAuth: []
            parameters:
                - name: idea_id
                  in: path
                  required: true
                  schema:
                      type: string
                      format: uuid
            responses:
                "204":
                    description: Идея успешно удалена
                "401":
                    description: Не авторизован
                "403":
                    description: Доступ запрещен (не автор)
                "404":
                    description: Идея не найдена

    /ideas/{idea_id}/favorite:
        post:
            summary: Добавить/убрать из избранного
            description: Переключает состояние избранного для текущего пользователя.
            tags:
                - Идеи
            security:
                - BearerAuth: []
            parameters:
                - name: idea_id
                  in: path
                  required: true
                  schema:
                      type: string
                      format: uuid
            responses:
                "200":
                    description: Состояние изменено
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    is_favorite:
                                        type: boolean
                                        description: Текущее состояние (true - в избранном)
                "401":
                    description: Не авторизован
                "404":
                    description: Идея не найдена

    /ideas/{idea_id}/project:
        post:
            summary: Создать проект на основе идеи
            description: Создает новый проект, копируя title и description из идеи. Лидером становится автор идеи.
            tags:
                - Идеи
                - Проекты
            security:
                - BearerAuth: []
            parameters:
                - name: idea_id
                  in: path
                  required: true
                  schema:
                      type: string
                      format: uuid
            responses:
                "201":
                    description: Проект успешно создан
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Project"
                "401":
                    description: Не авторизован
                "403":
                    description: Только автор идеи может создавать проект
                "404":
                    description: Идея не найдена

    # ========== Проекты ==========
    /projects:
        get:
            summary: Список проектов
            description: Возвращает список проектов с пагинацией и фильтрацией.
            tags:
                - Проекты
            parameters:
                - name: leader_id
                  in: query
                  schema:
                      type: string
                      format: uuid
                  description: Фильтр по лидеру проекта
                - name: status
                  in: query
                  schema:
                      type: string
                      enum: [open, closed]
                  description: Фильтр по статусу проекта
                - name: search
                  in: query
                  schema:
                      type: string
                  description: Поиск по заголовку и описанию
                - name: start_at
                  in: query
                  schema:
                      type: integer
                      default: 0
                  description: Порядковый номер проекта с которого начинаем
                - name: limit
                  in: query
                  schema:
                      type: integer
                      default: 50
            responses:
                "200":
                    description: Список проектов
                    content:
                        application/json:
                            schema:
                                type: array
                                items:
                                    $ref: "#/components/schemas/Project"
        post:
            summary: Создать проект
            description: Создает новый проект (не на основе идеи).
            tags:
                - Проекты
            security:
                - BearerAuth: []
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            required:
                                - title
                                - description
                            properties:
                                idea_id:
                                    type: string
                                    format: uuid
                                    description: ID идеи, если проект создается на ее основе (альтернатива прямому созданию)
                                title:
                                    type: string
                                    example: "AI Language Learning App"
                                description:
                                    type: string
                                    example: "Разработка мобильного приложения для изучения языков с AI."
            responses:
                "201":
                    description: Проект успешно создан
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Project"
                "400":
                    description: Ошибка валидации
                "401":
                    description: Не авторизован

    /projects/{project_id}:
        get:
            summary: Детали проекта
            description: Возвращает информацию о проекте, включая слоты и участников команды.
            tags:
                - Проекты
            parameters:
                - name: project_id
                  in: path
                  required: true
                  schema:
                      type: string
                      format: uuid
            responses:
                "200":
                    description: Детали проекта
                    content:
                        application/json:
                            schema:
                                allOf:
                                    - $ref: "#/components/schemas/Project"
                                    - type: object
                                      properties:
                                          slots:
                                              type: array
                                              items:
                                                  $ref: "#/components/schemas/ProjectSlot"
                "404":
                    description: Проект не найден
        put:
            summary: Редактировать проект
            description: Обновляет информацию о проекте. Доступно только лидеру.
            tags:
                - Проекты
            security:
                - BearerAuth: []
            parameters:
                - name: project_id
                  in: path
                  required: true
                  schema:
                      type: string
                      format: uuid
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                title:
                                    type: string
                                description:
                                    type: string
                                status:
                                    type: string
                                    enum: [open, closed]
            responses:
                "200":
                    description: Проект обновлен
                "401":
                    description: Не авторизован
                "403":
                    description: Доступ запрещен (не лидер)
                "404":
                    description: Проект не найден
        delete:
            summary: Удалить проект
            description: Удаляет проект. Доступно только лидеру, если в проекте нет участников.
            tags:
                - Проекты
            security:
                - BearerAuth: []
            parameters:
                - name: project_id
                  in: path
                  required: true
                  schema:
                      type: string
                      format: uuid
            responses:
                "204":
                    description: Проект успешно удален
                "401":
                    description: Не авторизован
                "403":
                    description: Доступ запрещен (не лидер или есть команда)
                "404":
                    description: Проект не найден

    # ========== Слоты проектов ==========
    /projects/{project_id}/slots:
        get:
            summary: Список слотов проекта
            description: Возвращает все слоты (вакансии) проекта.
            tags:
                - Слоты проектов
            parameters:
                - name: project_id
                  in: path
                  required: true
                  schema:
                      type: string
                      format: uuid
            responses:
                "200":
                    description: Список слотов
                    content:
                        application/json:
                            schema:
                                type: array
                                items:
                                    $ref: "#/components/schemas/ProjectSlot"
                "404":
                    description: Проект не найден
        post:
            summary: Создать слот
            description: Создает новый слот (вакансию) в проекте. Доступно только лидеру.
            tags:
                - Слоты проектов
            security:
                - BearerAuth: []
            parameters:
                - name: project_id
                  in: path
                  required: true
                  schema:
                      type: string
                      format: uuid
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            required:
                                - skill_category_id
                                - title
                            properties:
                                skill_category_id:
                                    type: string
                                    format: uuid
                                    description: ID требуемого навыка
                                title:
                                    type: string
                                    example: "Backend Developer"
                                description:
                                    type: string
                                    example: "Ищем опытного Python разработчика"
                                status:
                                    type: string
                                    enum: [open, closed]
                                    default: open
            responses:
                "201":
                    description: Слот успешно создан
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ProjectSlot"
                "400":
                    description: Ошибка валидации
                "401":
                    description: Не авторизован
                "403":
                    description: Доступ запрещен (не лидер)
                "404":
                    description: Проект не найден

    /projects/{project_id}/slots/{slot_id}:
        put:
            summary: Редактировать слот
            description: Обновляет информацию о слоте. Доступно только лидеру проекта.
            tags:
                - Слоты проектов
            security:
                - BearerAuth: []
            parameters:
                - name: project_id
                  in: path
                  required: true
                  schema:
                      type: string
                      format: uuid
                - name: slot_id
                  in: path
                  required: true
                  schema:
                      type: string
                      format: uuid
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                skill_category_id:
                                    type: string
                                    format: uuid
                                title:
                                    type: string
                                description:
                                    type: string
                                status:
                                    type: string
                                    enum: [open, closed]
            responses:
                "200":
                    description: Слот обновлен
                "401":
                    description: Не авторизован
                "403":
                    description: Доступ запрещен (не лидер)
                "404":
                    description: Слот или проект не найден
        delete:
            summary: Удалить/закрыть слот
            description: Удаляет слот. Доступно только лидеру проекта.
            tags:
                - Слоты проектов
            security:
                - BearerAuth: []
            parameters:
                - name: project_id
                  in: path
                  required: true
                  schema:
                      type: string
                      format: uuid
                - name: slot_id
                  in: path
                  required: true
                  schema:
                      type: string
                      format: uuid
            responses:
                "204":
                    description: Слот успешно удален
                "401":
                    description: Не авторизован
                "403":
                    description: Доступ запрещен (не лидер)
                "404":
                    description: Слот или проект не найден

    # ========== Отклики и приглашения ==========
    /projects/{project_id}/requests:
        get:
            summary: Список откликов на проект
            description: Возвращает все отклики/приглашения по проекту для лидера.
            tags:
                - Отклики
            security:
                - BearerAuth: []
            parameters:
                - name: project_id
                  in: path
                  required: true
                  schema:
                      type: string
                      format: uuid
                - name: slot_id
                  in: query
                  schema:
                      type: string
                      format: uuid
                  description: Фильтр по конкретному слоту
                - name: status
                  in: query
                  schema:
                      type: string
                      enum: [pending, accepted, rejected]
                  description: Фильтр по статусу
            responses:
                "200":
                    description: Список откликов
                    content:
                        application/json:
                            schema:
                                type: array
                                items:
                                    $ref: "#/components/schemas/Request"
                "401":
                    description: Не авторизован
                "403":
                    description: Доступ запрещен (не лидер проекта)

    /projects/{project_id}/slots/{slot_id}/apply:
        post:
            summary: Откликнуться на слот
            description: Пользователь отправляет заявку (apply) на слот в проекте.
            tags:
                - Отклики
            security:
                - BearerAuth: []
            parameters:
                - name: project_id
                  in: path
                  required: true
                  schema:
                      type: string
                      format: uuid
                - name: slot_id
                  in: path
                  required: true
                  schema:
                      type: string
                      format: uuid
            requestBody:
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                cover_letter:
                                    type: string
                                    description: Сопроводительное письмо
                                    example: "Имею большой опыт в этой сфере..."
            responses:
                "201":
                    description: Отклик успешно отправлен
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Request"
                "400":
                    description: Нельзя откликнуться на свой проект или слот уже занят
                "401":
                    description: Не авторизован
                "404":
                    description: Слот или проект не найден

    /projects/{project_id}/slots/{slot_id}/invite:
        post:
            summary: Пригласить пользователя
            description: Лидер проекта отправляет приглашение (invite) пользователю на слот.
            tags:
                - Отклики
            security:
                - BearerAuth: []
            parameters:
                - name: project_id
                  in: path
                  required: true
                  schema:
                      type: string
                      format: uuid
                - name: slot_id
                  in: path
                  required: true
                  schema:
                      type: string
                      format: uuid
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            required:
                                - user_id
                            properties:
                                user_id:
                                    type: string
                                    format: uuid
                                    description: ID приглашаемого пользователя
                                cover_letter:
                                    type: string
                                    description: Сопроводительное письмо
            responses:
                "201":
                    description: Приглашение успешно отправлено
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Request"
                "400":
                    description: Нельзя пригласить самого себя или слот уже занят
                "401":
                    description: Не авторизован
                "403":
                    description: Доступ запрещен (не лидер)
                "404":
                    description: Слот, проект или пользователь не найден

    /requests/{request_id}/accept:
        put:
            summary: Принять отклик/приглашение
            description: |
                Принимает отклик или приглашение.
                - Для отклика (apply): принимает лидер проекта.
                - Для приглашения (invite): принимает приглашенный пользователь.
                При успехе слот занимается пользователем.
            tags:
                - Отклики
            security:
                - BearerAuth: []
            parameters:
                - name: request_id
                  in: path
                  required: true
                  schema:
                      type: string
                      format: uuid
                  description: ID отклика/приглашения
            responses:
                "200":
                    description: Отклик принят. Слот занят.
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Request"
                "400":
                    description: Нельзя принять (возможно, слот уже занят)
                "401":
                    description: Не авторизован
                "403":
                    description: Нет прав для принятия (не лидер и не получатель invite)
                "404":
                    description: Отклик не найден

    /requests/{request_id}/reject:
        put:
            summary: Отклонить отклик/приглашение
            description: |
                Отклоняет отклик или приглашение.
                - Для отклика (apply): отклоняет лидер проекта.
                - Для приглашения (invite): отклоняет приглашенный пользователь.
            tags:
                - Отклики
            security:
                - BearerAuth: []
            parameters:
                - name: request_id
                  in: path
                  required: true
                  schema:
                      type: string
                      format: uuid
                  description: ID отклика/приглашения
            responses:
                "200":
                    description: Отклик отклонен
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Request"
                "401":
                    description: Не авторизован
                "403":
                    description: Нет прав для отклонения
                "404":
                    description: Отклик не найден

    /users/me/requests:
        get:
            summary: Мои отклики и приглашения
            description: Возвращает список откликов (где пользователь applicant) и приглашений (где пользователь invitee).
            tags:
                - Отклики
                - Пользователи
            security:
                - BearerAuth: []
            parameters:
                - name: type
                  in: query
                  schema:
                      type: string
                      enum: [apply, invite]
                  description: Фильтр по типу (исходящие отклики или входящие приглашения)
                - name: status
                  in: query
                  schema:
                      type: string
                      enum: [pending, accepted, rejected]
                  description: Фильтр по статусу
            responses:
                "200":
                    description: Список откликов и приглашений
                    content:
                        application/json:
                            schema:
                                type: array
                                items:
                                    $ref: "#/components/schemas/Request"
                "401":
                    description: Не авторизован

components:
    securitySchemes:
        BearerAuth:
            type: http
            scheme: bearer
            bearerFormat: JWT

    schemas:
        User:
            type: object
            properties:
                id:
                    type: string
                    format: uuid
                email:
                    type: string
                    format: email
                nickname:
                    type: string
                avatar_uri:
                    type: string
                    format: uri
                bio:
                    type: string
                created_at:
                    type: string
                    format: date-time

        PrivateUserProfile:
            allOf:
                - $ref: "#/components/schemas/User"
                - type: object
                  properties:
                      skills:
                          type: array
                          items:
                              $ref: "#/components/schemas/Skill"

        PublicUserProfile:
            type: object
            properties:
                id:
                    type: string
                    format: uuid
                nickname:
                    type: string
                avatar_uri:
                    type: string
                    format: uri
                bio:
                    type: string
                skills:
                    type: array
                    items:
                        $ref: "#/components/schemas/Skill"

        Skill:
            type: object
            properties:
                id:
                    type: string
                    format: uuid
                name:
                    type: string
                parent_id:
                    type: string
                    format: uuid
                    nullable: true
                children:
                    type: array
                    items:
                        $ref: "#/components/schemas/Skill"

        Idea:
            type: object
            properties:
                id:
                    type: string
                    format: uuid
                title:
                    type: string
                description:
                    type: string
                author_id:
                    type: string
                    format: uuid
                created_at:
                    type: string
                    format: date-time
                updated_at:
                    type: string
                    format: date-time

        Project:
            type: object
            properties:
                id:
                    type: string
                    format: uuid
                title:
                    type: string
                description:
                    type: string
                leader_id:
                    type: string
                    format: uuid
                status:
                    type: string
                    enum: [open, closed]
                idea_id:
                    type: string
                    format: uuid
                    nullable: true
