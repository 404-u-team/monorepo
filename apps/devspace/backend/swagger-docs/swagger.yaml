openapi: 3.0.0
info:
    title: API Платформы для проектов
    description: API для управления пользователями, навыками, идеями, проектами и откликами.
    version: 1.0.0
servers:
    - url: https://be.dev-main.stand.devspace.404.ms0ur.dev
      description: Основной стенд (ветка main)
    - url: http://localhost:8080
      description: Локальный сервер для разработки (стандартный порт)
tags:
    - name: Аутентификация
    - name: Пользователи
    - name: Навыки
    - name: Идеи
    - name: Проекты
    - name: Слоты проектов
    - name: Отклики
    - name: Тестовые данные
paths:
    /auth/register:
        post:
            summary: Регистрация пользователя
            deprecated: false
            description: Создает нового пользователя с ролью USER. Пароль хэшируется.
            tags:
                - Аутентификация
            parameters: []
            requestBody:
                content:
                    application/json:
                        schema:
                            type: object
                            required:
                                - email
                                - password
                                - nickname
                            properties:
                                email:
                                    type: string
                                    format: email
                                    example: user@example.com
                                password:
                                    type: string
                                    format: password
                                    minLength: 8
                                    example: securePassword123
                                nickname:
                                    type: string
                        example:
                            email: user@example.com
                            nickname: example
                            password: securePassword123
                required: true
            responses:
                "201":
                    description: Пользователь успешно зарегистрирован
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/AccessTokenResponse"
                    headers:
                        Set-Cookie:
                            schema:
                                type: string
                            description: HttpOnly cookie с refresh_token
                "400":
                    description: Ошибка валидации запроса
                    headers: {}
                "409":
                    description: Пользователь с таким email уже существует
                    headers: {}
                "500":
                    description: Внутренняя ошибка сервера
                    headers: {}
            security: []
    /auth/login:
        post:
            summary: Вход в систему
            deprecated: false
            description: Аутентификация пользователя и получение JWT токенов.
            tags:
                - Аутентификация
            parameters: []
            requestBody:
                content:
                    application/json:
                        schema:
                            type: object
                            required:
                                - login
                                - password
                            properties:
                                login:
                                    type: string
                                password:
                                    type: string
                                    format: password
                        example:
                            login: user@example.com
                            password: securePassword123
                required: true
            responses:
                "200":
                    description: Успешный вход. Возвращает access token.
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/AccessTokenResponse"
                    headers:
                        Set-Cookie:
                            schema:
                                type: string
                            description: HttpOnly cookie с refresh_token
                "400":
                    description: Ошибка валидации запроса
                    headers: {}
                "401":
                    description: Неверные учетные данные
                    headers: {}
                "500":
                    description: Внутренняя ошибка сервера
                    headers: {}
            security: []
    /auth/refresh:
        post:
            summary: Обновление Access токена
            deprecated: false
            description: Получение нового access token по refresh_token из HttpOnly cookie.
            tags:
                - Аутентификация
            parameters: []
            responses:
                "200":
                    description: Access token успешно обновлен.
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/AccessTokenResponse"
                    headers:
                        Set-Cookie:
                            schema:
                                type: string
                            description: HttpOnly cookie с новым refresh_token
                "401":
                    description: Недействительный или просроченный Refresh токен
                    headers: {}
                "500":
                    description: Внутренняя ошибка сервера
                    headers: {}
            security: []
    /users/me:
        get:
            summary: Получить свой профиль
            deprecated: false
            description: Возвращает полную информацию о текущем авторизованном пользователе.
            tags:
                - Пользователи
            parameters: []
            responses:
                "200":
                    description: Информация о профиле
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/PrivateUserProfile"
                    headers: {}
                "401":
                    description: Не авторизован
                    headers: {}
                "500":
                    description: Внутренняя ошибка сервера
                    headers: {}
            security:
                - BearerAuth: []
        put:
            summary: Обновить свой профиль
            deprecated: false
            description: Обновляет информацию текущего пользователя.
            tags:
                - Пользователи
            parameters: []
            requestBody:
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                nickname:
                                    type: string
                                    example: john_doe
                                main_role:
                                    type: string
                                    format: uuid
                                    example: 123e4567-e89b-12d3-a456-426614174000
                                    description: Навык первого уровня
                                avatar_url:
                                    type: string
                                    format: uri
                                    example: https://example.com/avatar.jpg
                                bio:
                                    type: string
                                    example: Full-stack разработчик
                required: true
            responses:
                "200":
                    description: Профиль успешно обновлен
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/PrivateUserProfile"
                    headers: {}
                "400":
                    description: Ошибка валидации
                    headers: {}
                "401":
                    description: Не авторизован
                    headers: {}
                "409":
                    description: Пользователь с таким nickname уже существует
                    headers: {}
                "500":
                    description: Внутренняя ошибка сервера
                    headers: {}
            security:
                - BearerAuth: []
    /users:
        get:
            security:
                - BearerAuth: []
            summary: Получить пользователей по списку критериев
            tags:
                - Пользователи
            parameters:
                - name: start_at
                  in: query
                  schema:
                      type: integer
                      minimum: 0
                      default: 0
                  description: "Смещение для пагинации"

                - name: limit
                  in: query
                  schema:
                      type: integer
                      minimum: 1
                      maximum: 100
                      default: 10
                  description: "Лимит записей"

                - name: search
                  in: query
                  schema:
                      type: string
                  description: "Фильтр по имени пользователя"

                - name: main_role
                  in: query
                  schema:
                      type: string
                      format: uuid
                  description: "Фильтр по основной роли"

                - name: skills
                  in: query
                  schema:
                      type: array
                      items:
                          type: string
                          format: uuid
                  style: form
                  explode: true
                  description: "Фильтр по навыкам (должны быть все)"

            responses:
                "200":
                    description: Данные возвращены успешно
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/GetUsersResponse"
                "400":
                    description: Ошибка в параметрах запроса
                "500":
                    description: Внутренняя ошибка сервера

    /users/me/skills:
        post:
            summary: Добавить навык в профиль
            deprecated: false
            description: >-
                Добавляет ссылку на существующую категорию навыка в профиль
                пользователя.
            tags:
                - Пользователи
                - Навыки
            parameters: []
            requestBody:
                content:
                    application/json:
                        schema:
                            type: object
                            required:
                                - skill_id
                            properties:
                                skill_id:
                                    type: string
                                    format: uuid
                                    example: 123e4567-e89b-12d3-a456-426614174000
                required: true
            responses:
                "201":
                    description: Навык успешно добавлен
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/UserSkillLink"
                    headers: {}
                "400":
                    description: Навык уже существует у пользователя или не найден
                    headers: {}
                "401":
                    description: Не авторизован
                    headers: {}
                "409":
                    description: Пользователь с таким навыком уже существует
                    headers: {}
                "500":
                    description: Внутренняя ошибка сервера
                    headers: {}
            security:
                - BearerAuth: []
    /users/me/skills/{skill_id}:
        delete:
            summary: Удалить навык из профиля
            deprecated: false
            description: Удаляет навык из списка навыков пользователя.
            tags:
                - Пользователи
                - Навыки
            parameters:
                - name: skill_id
                  in: path
                  description: UUID навыка
                  required: true
                  schema:
                      type: string
                      format: uuid
            responses:
                "204":
                    description: Навык успешно удален
                    headers: {}
                "400":
                    description: Некорректные параметры запроса
                    headers: {}
                "401":
                    description: Не авторизован
                    headers: {}
                "500":
                    description: Внутренняя ошибка сервера
                    headers: {}
            security:
                - BearerAuth: []
    /users/{user_id}:
        get:
            summary: Получить публичный профиль
            deprecated: false
            description: Возвращает публичную информацию о другом пользователе.
            tags:
                - Пользователи
            parameters:
                - name: user_id
                  in: path
                  description: UUID пользователя
                  required: true
                  example: ""
                  schema:
                      type: string
                      format: uuid
            responses:
                "200":
                    description: Публичный профиль пользователя
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/PublicUserProfile"
                    headers: {}
                "404":
                    description: Пользователь не найден
                    headers: {}
            security: []
    /skills:
        get:
            summary: Получить список навыков
            deprecated: false
            description: >-
                Возвращает список всех категорий навыков с возможностью фильтрации по
                родителю и поиску.
            tags:
                - Навыки
            parameters:
                - name: parent_id
                  in: query
                  description: Фильтр по родительской категории (оставьте пустым для корневых)
                  required: false
                  schema:
                      type: string
                      format: uuid
                - name: search
                  in: query
                  description: Поиск по названию навыка
                  required: false
                  schema:
                      type: string
                - name: start_at
                  in: query
                  description: Сдвиг возвращаемых значений
                  required: false
                  schema:
                      type: integer
                      default: 0
                - name: limit
                  in: query
                  description: Количество записей на странице
                  required: false
                  schema:
                      type: integer
                      default: 20
            responses:
                "200":
                    description: Список навыков
                    content:
                        application/json:
                            schema:
                                type: array
                                items:
                                    $ref: "#/components/schemas/Skill"
                    headers: {}
                "400":
                    description: Ошибка query параметров
                    headers: {}
                "500":
                    description: Внутренняя ошибка сервера
                    headers: {}
            security: []
        post:
            summary: Создать новый навык
            deprecated: false
            description: >-
                Создает новую категорию навыка. Доступно только
                модераторам/администраторам.
            tags:
                - Навыки
            parameters: []
            requestBody:
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                name:
                                    type: string
                                    description: название
                                parent_id:
                                    type: string
                                    description: >-
                                        родитель. Если не указан, навык будет навыком первого
                                        уровня.
                            required:
                                - name
                        examples: {}
                required: true
            responses:
                "201":
                    description: Навык успешно создан
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Skill"
                    headers: {}
                "400":
                    description: Ошибка валидации
                    headers: {}
                "401":
                    description: Не авторизован
                    headers: {}
                "403":
                    description: Недостаточно прав
                    headers: {}
                "409":
                    description: Навык с таким именем уже существует
                    headers: {}
                "500":
                    description: Внутренняя ошибка сервера
                    headers: {}
            security:
                - BearerAuth: []
    /skills/{skill_id}:
        get:
            summary: Получить детали навыка
            deprecated: false
            description: Возвращает информацию о конкретном навыке.
            tags:
                - Навыки
            parameters:
                - name: skill_id
                  in: path
                  description: UUID навыка
                  required: true
                  example: ""
                  schema:
                      type: string
                      format: uuid
            responses:
                "200":
                    description: Информация о навыке
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Skill"
                    headers: {}
                "400":
                    description: UUID навыка невалиден
                    headers: {}
                "404":
                    description: Навык не найден
                    headers: {}
                "500":
                    description: Внутренняя ошибка сервера
            security: []
        delete:
            summary: Удалить навык
            deprecated: false
            description: Позволяет удалить навык. Доступен только админам
            tags:
                - Навыки
            parameters:
                - name: skill_id
                  in: path
                  description: ""
                  required: true
                  schema:
                      type: string
                - name: cascade
                  in: query
                  description: Должно ли удаление родителя удалять детей. По-умолчанию false
                  required: false
                  schema:
                      type: boolean
            responses:
                "204":
                    description: Навык успешно удален
                    headers: {}
                "401":
                    description: Не авторизован
                    headers: {}
                "403":
                    description: Недостаточно прав
                    headers: {}
                "404":
                    description: Запись с таким id не существует
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorResponse"
                            example:
                                error: Записи с таким id не существует
                    headers: {}
                "500":
                    description: Внутренняя ошибка сервера
                    headers: {}
            security:
                - BearerAuth: []
    /ideas:
        get:
            summary: Список идей
            deprecated: false
            description: Возвращает список идей с пагинацией и фильтрацией.
            tags:
                - Идеи
            parameters:
                - name: author_id
                  in: query
                  description: Фильтр по автору
                  required: false
                  schema:
                      type: string
                      format: uuid
                - name: search
                  in: query
                  description: Поиск по заголовку и описанию
                  required: false
                  schema:
                      type: string
                - name: favorites
                  in: query
                  description: >-
                      Показать только избранные идеи текущего пользователя (требует
                      авторизации)
                  required: false
                  schema:
                      type: boolean
                - name: start_at
                  in: query
                  description: Смещение для выборки
                  required: false
                  schema:
                      type: integer
                      default: 0
                - name: limit
                  in: query
                  description: Максимальное количество записей
                  required: false
                  schema:
                      type: integer
                      default: 20
            responses:
                "200":
                    description: Список идей
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/GetIdeasResponse"
                    headers: {}
                "400":
                    description: Ошибка query параметров
                    headers: {}
                "500":
                    description: Внутренняя ошибка сервера
                    headers: {}
            security: []
        post:
            summary: Создать идею
            deprecated: false
            description: Создает новую идею. Автор устанавливается автоматически из токена.
            tags:
                - Идеи
            parameters: []
            requestBody:
                content:
                    application/json:
                        schema:
                            type: object
                            required:
                                - title
                            properties:
                                title:
                                    type: string
                                    example: Мобильное приложение для изучения языков
                                description:
                                    type: string
                                    example: >-
                                        Идея создания приложения с использованием AI для практики
                                        разговорной речи.
                                content:
                                    type: string
                                    example: "**Md текст**"
                                category:
                                    type: string
                                    example: Education
                required: true
            responses:
                "201":
                    description: Идея успешно создана
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Idea"
                    headers: {}
                "400":
                    description: Ошибка валидации
                    headers: {}
                "401":
                    description: Не авторизован
                    headers: {}
                "409":
                    description: Идея с таким названием уже существует
                    headers: {}
                "500":
                    description: Внутренняя ошибка сервера
                    headers: {}
            security:
                - BearerAuth: []
    /ideas/{idea_id}:
        get:
            summary: Получить детали идеи
            deprecated: false
            description: >-
                Возвращает информацию о конкретной идее (включая счетчики просмотров и
                избранного).
            tags:
                - Идеи
            parameters:
                - name: idea_id
                  in: path
                  description: UUID идеи
                  required: true
                  example: ""
                  schema:
                      type: string
                      format: uuid
            responses:
                "200":
                    description: Детали идеи
                    content:
                        application/json:
                            schema:
                                allOf:
                                    - $ref: "#/components/schemas/Idea"
                                    - type: object
                                      properties:
                                          views_count:
                                              type: integer
                                              example: 150
                                          favorites_count:
                                              type: integer
                                              example: 25
                    headers: {}
                "404":
                    description: Идея не найдена
                    headers: {}
                "500":
                    description: Внутренняя ошибка сервера
                    headers: {}
            security: []
        put:
            summary: Редактировать идею
            deprecated: false
            description: Обновляет информацию об идее. Доступно только автору.
            tags:
                - Идеи
            parameters:
                - name: idea_id
                  in: path
                  description: ""
                  required: true
                  example: ""
                  schema:
                      type: string
                      format: uuid
            requestBody:
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                title:
                                    type: string
                                description:
                                    type: string
                                content:
                                    type: string
                required: true
            responses:
                "200":
                    description: Идея обновлена
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Idea"
                    headers: {}
                "401":
                    description: Не авторизован
                    headers: {}
                "403":
                    description: Доступ запрещен (не автор)
                    headers: {}
                "404":
                    description: Идея не найдена
                    headers: {}
                "409":
                    description: Идея с таким названием уже существует
                    headers: {}
                "500":
                    description: Внутренняя ошибка сервера
                    headers: {}
            security:
                - BearerAuth: []
        delete:
            summary: Удалить идею
            deprecated: false
            description: Удаляет идею. Доступно только автору.
            tags:
                - Идеи
            parameters:
                - name: idea_id
                  in: path
                  description: ""
                  required: true
                  example: ""
                  schema:
                      type: string
                      format: uuid
            responses:
                "204":
                    description: Идея успешно удалена
                    headers: {}
                "401":
                    description: Не авторизован
                    headers: {}
                "403":
                    description: Доступ запрещен (не автор)
                    headers: {}
                "404":
                    description: Идея не найдена
                    headers: {}
                "500":
                    description: Внутренняя ошибка сервера
                    headers: {}
            security:
                - BearerAuth: []
    /ideas/{idea_id}/favorite:
        post:
            summary: Добавить/убрать из избранного
            deprecated: false
            description: Переключает состояние избранного для текущего пользователя.
            tags:
                - Идеи
            parameters:
                - name: idea_id
                  in: path
                  description: ""
                  required: true
                  example: ""
                  schema:
                      type: string
                      format: uuid
            responses:
                "200":
                    description: Состояние изменено
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    is_favorite:
                                        type: boolean
                                        description: Текущее состояние (true - в избранном)
                    headers: {}
                "401":
                    description: Не авторизован
                    headers: {}
                "404":
                    description: Идея не найдена
                    headers: {}
            security:
                - BearerAuth: []
    /projects:
        get:
            summary: Список проектов
            deprecated: false
            description: Возвращает список проектов с пагинацией и фильтрацией.
            tags:
                - Проекты
            parameters:
                - name: leader_id
                  in: query
                  description: Фильтр по лидеру проекта
                  required: false
                  schema:
                      type: string
                      format: uuid
                - name: status
                  in: query
                  description: Фильтр по статусу проекта
                  required: false
                  schema:
                      type: string
                      enum:
                          - open
                          - closed
                - name: search
                  in: query
                  description: Поиск по заголовку и описанию
                  required: false
                  schema:
                      type: string
                - name: idea_id
                  in: query
                  description: Фильтр по идее
                  required: false
                  schema:
                      type: string
                      format: uuid
                - name: open_slots
                  in: query
                  description: Фильтр по наличию слотов (true - только с открытыми, false - все)
                  required: false
                  schema:
                      type: string
                      enum:
                          - true
                          - false
                - name: slots_skills
                  in: query
                  description: Фильтр по скиллам в слотах
                  required: false
                  schema:
                      type: array
                      items:
                          type: string
                          format: uuid
                - name: min_people
                  in: query
                  description: Фильрация по минимальному кол-ву людей в проекте (учитывая создателя)
                  required: false
                  schema:
                      type: int
                - name: max_people
                  in: query
