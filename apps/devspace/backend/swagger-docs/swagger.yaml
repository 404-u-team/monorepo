      summary: Принять отклик/приглашение
      deprecated: false
      description: |
        Принимает отклик или приглашение.
        - Для отклика (apply): принимает лидер проекта.
        - Для приглашения (invite): принимает приглашенный пользователь.
        При успехе слот занимается пользователем.
      tags:
        - Отклики
      parameters:
        - name: request_id
          in: path
          description: ID отклика/приглашения
          required: true
          example: ''
          schema:
            type: string
            format: uuid
